<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KmpTemplate</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&family=Noto+Sans+Bengali&display=swap" rel="stylesheet">
    <script>
        // Apply saved language before Compose starts
        (function() {
            var savedLang = localStorage.getItem("app_lang");
            console.log("Web Bootstrap: savedLang is '" + savedLang + "'");
            if (savedLang !== null && savedLang !== "") {
                document.documentElement.setAttribute("lang", savedLang);
                console.log("Web Bootstrap: Set html lang to '" + savedLang + "'");
            } else {
                document.documentElement.setAttribute("lang", "en");
                console.log("Web Bootstrap: Defaulting to 'en'");
            }
        })();
    </script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Noto Sans JP', 'Noto Sans Bengali', sans-serif;
            background-color: white;
        }
        #ComposeTarget {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="ComposeTarget"></div>
    <script src="common.js"></script>
</body>
</html>
